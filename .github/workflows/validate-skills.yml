name: Repository Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repository-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-validation:
    name: Repository Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate skills and generated catalog
        run: python scripts/validate_skills.py

      - name: Validate smoke fixtures
        run: python tests/run_smoke_tests.py

      - name: Validate eval and trigger definitions
        run: python scripts/validate_evals.py

      - name: Check Python syntax
        run: >-
          python -m py_compile
          scripts/validate_skills.py
          scripts/install_skill.py
          scripts/generate_catalog.py
          scripts/validate_evals.py
          scripts/scan_skill_security.py
          scripts/run_codex_evals.py
          tests/run_smoke_tests.py
          tests/test_helpers.py
          tests/test_repository_regressions.py

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

  security-scan:
    name: Skill Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Scan helper capabilities
        run: python scripts/scan_skill_security.py
